<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Zephyr — quote follow-up automation for Jobber">
  <defs>
    <linearGradient id="z-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1822"/>
      <stop offset="1" stop-color="#080e15"/>
    </linearGradient>
    <linearGradient id="z-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="z-spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.4" stop-color="#2dd4bf"/>
      <stop offset="0.7" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="z-wind" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="z-glow" cx="0.82" cy="0.08" r="0.65">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <style>
      .f { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#z-bg)"/>
  <rect width="1200" height="340" rx="20" fill="url(#z-glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="20" fill="none" stroke="#1b2a3a" stroke-width="1"/>

  <!-- breeze motif, top-right -->
  <g fill="none" stroke="url(#z-wind)" stroke-linecap="round">
    <path d="M780 72 q 130 -30 250 0 t 120 8" stroke-width="3" opacity="0.95"/>
    <path d="M820 108 q 130 -26 240 4 t 90 4" stroke-width="2.5" opacity="0.7"/>
    <path d="M800 144 q 140 -20 260 8" stroke-width="2" opacity="0.5"/>
  </g>
  <circle cx="1150" cy="80" r="5" fill="#34d399"/>
  <circle cx="1150" cy="116" r="4" fill="#22d3ee"/>
  <circle cx="1060" cy="152" r="3.5" fill="#818cf8"/>

  <!-- eyebrow -->
  <text class="f" x="64" y="76" font-size="13" font-weight="700" letter-spacing="2.5" fill="#5eead4">ZENOBIOS CASTILLO  ·  QUOTE FOLLOW-UP, AUTOMATED ON JOBBER</text>

  <!-- title -->
  <text class="f" x="61" y="158" font-size="66" font-weight="800" fill="url(#z-title)">Zephyr</text>

  <!-- subtitle -->
  <text class="f" x="64" y="198" font-size="19" font-weight="600" fill="#c2cdda">Catches the quotes that slip through the cracks — and writes the follow-up</text>
  <text class="f" x="64" y="224" font-size="19" font-weight="600" fill="#c2cdda">the owner never has time to send.</text>

  <!-- stage spectrum -->
  <line x1="80" y1="288" x2="580" y2="288" stroke="url(#z-spectrum)" stroke-width="2" opacity="0.55"/>
  <g class="f" font-size="12.5" font-weight="700" text-anchor="middle">
    <circle cx="80"  cy="288" r="5" fill="#34d399"/><text x="80"  y="313" fill="#8b95a6">Detect</text>
    <circle cx="180" cy="288" r="5" fill="#2dd4bf"/><text x="180" y="313" fill="#8b95a6">Classify</text>
    <circle cx="280" cy="288" r="5" fill="#22d3ee"/><text x="280" y="313" fill="#8b95a6">Draft</text>
    <circle cx="380" cy="288" r="5" fill="#38bdf8"/><text x="380" y="313" fill="#8b95a6">Gate</text>
    <circle cx="480" cy="288" r="5" fill="#818cf8"/><text x="480" y="313" fill="#8b95a6">Approve</text>
    <circle cx="580" cy="288" r="5" fill="#fbbf24"/><text x="580" y="313" fill="#8b95a6">Send</text>
  </g>
  <text class="f" x="612" y="292" font-size="11" font-weight="700" fill="#fbbf24">▸ opt-in</text>
</svg>
